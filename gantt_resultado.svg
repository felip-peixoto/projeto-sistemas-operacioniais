<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="170"
     height="280"
     viewBox="0 0 170 280">

<defs>
  <style type="text/css">
    .label { font-size: 12px; font-family: Arial, sans-serif; }
    .tick { font-size: 10px; font-family: Arial, sans-serif; }
    rect { stroke: #333333; stroke-width: 1; }
  </style>
</defs>

<rect x="0" y="0" width="170" height="280"
      fill="#FFFFFF" stroke="#000000" stroke-width="2"/>

<line x1="150" y1="80" x2="150" y2="200" stroke="#CCCCCC" stroke-width="0.5"/>

<line x1="150" y1="80" x2="150" y2="80" stroke="#CCCCCC" stroke-width="0.5"/>
<line x1="150" y1="120" x2="150" y2="120" stroke="#CCCCCC" stroke-width="0.5"/>
<line x1="150" y1="160" x2="150" y2="160" stroke="#CCCCCC" stroke-width="0.5"/>
<line x1="150" y1="200" x2="150" y2="200" stroke="#CCCCCC" stroke-width="0.5"/>


<text x="150" y="70" class="tick" text-anchor="middle">0</text>

<text x="140" y="105.0" class="label" text-anchor="end">P3</text>
<text x="140" y="145.0" class="label" text-anchor="end">P2</text>
<text x="140" y="185.0" class="label" text-anchor="end">P1</text>

</svg>